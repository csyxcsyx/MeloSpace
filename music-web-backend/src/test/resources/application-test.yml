spring:
  datasource:
    url: jdbc:h2:mem:music_web;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-test.sql
      data-locations: classpath:db/data-test.sql

music-web:
  jwt:
    secret: test-secret-for-music-web-backend-foundation
    issuer: music-web-test
    expiration-minutes: 60
