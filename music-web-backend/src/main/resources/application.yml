spring:
  application:
    name: music-web-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

music-web:
  jwt:
    secret: ${JWT_SECRET:change-this-local-development-secret-change-this}
    issuer: ${JWT_ISSUER:music-web}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  media:
    base-url: ${MEDIA_BASE_URL:/media}
